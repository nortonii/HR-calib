parent_config: "configs/pandaset/exp_300_center.yaml"

exp_name: "pandaset_center_3000_nodensify"

opt:
  iterations: 3000
  position_lr_max_steps: 3000
  # Disable densification — LiDAR init already provides complete geometry
  # and noisy depth gradients cause point explosion
  densify_from_iter: 99999
  densify_until_iter: 99999

testing_iterations: 500
saving_iterations: [500, 1000, 2000, 3000]
visual_interval: 500
